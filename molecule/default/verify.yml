---
- name: Verify
  hosts: client
  tasks:
    - name: Query certificate issuer
      ansible.builtin.shell: "openssl x509 -in {{ cert_file }} -noout -text | grep Issuer: | sed -e 's/.*[:=]//' | xargs"
      vars:
        cert_file: "/etc/letsencrypt/live/{{ acme_certificate_domain }}.crt"
      register: _issuer_data
      changed_when: false

    - name: Verify certificate issuer
      ansible.builtin.assert:
        that: _issuer_data.stdout is search(_issuer_name)
        fail_msg: "Certificate issuer is '{{ _issuer_data.stdout }}'"
        success_msg: "Certificate issuer is '{{ _issuer_data.stdout }}'"
      vars:
        _issuer_name: "Pebble"

    - name: Query certificate CN
      ansible.builtin.shell: "openssl x509 -in {{ cert_file }} -noout -text | grep DNS: | sed -e 's/.*[:=]//' | xargs"
      vars:
        cert_file: "/etc/letsencrypt/live/{{ acme_certificate_domain }}.crt"
      register: _cert_cn
      changed_when: false

    - name: Verify certificate CN
      ansible.builtin.assert:
        that: _cert_cn.stdout is search(acme_certificate_domain)
        fail_msg: "Certificate CN is '{{ _cert_cn.stdout }}'"
        success_msg: "Certificate CN is '{{ _cert_cn.stdout }}'"
